<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ filename }} - QUALIHOME</title>
  <link rel="icon" href="{{ url_for('static', filename='img/essentials/icon.ico') }}" type="image/x-icon" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .viewer-wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .viewer-head {
      padding: 10px 14px;
      background: #111827;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-frame {
      flex: 1;
      width: 100%;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="viewer-wrap">
    <div class="viewer-head">{{ filename }}</div>
    <iframe class="viewer-frame" src="{{ file_url }}" title="Document Viewer"></iframe>
  </div>
</body>
</html>
